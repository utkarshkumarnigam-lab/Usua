<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasu — AI Assistant</title>
    <meta name="description" content="Hasu is your personal AI assistant. Chat naturally and get intelligent, thoughtful responses powered by Gemini.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-shell">

        <!-- ── Sidebar ── -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <div class="sidebar-logo">
                    <div class="logo-mark">H</div>
                    <span class="logo-text">Hasu</span>
                </div>
                <button class="new-chat-btn" id="new-chat-btn" title="New Chat">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    New Chat
                </button>
            </div>

            <div class="sidebar-history" id="sidebar-history">
                <p class="history-label">Today</p>
                <div class="history-item active">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    <span>Current Conversation</span>
                </div>
            </div>

            <div class="sidebar-footer">
                <div class="model-badge">
                    <div class="model-dot"></div>
                    <span>Gemini 2.5 Flash</span>
                </div>
            </div>
        </aside>

        <!-- ── Main Chat Area ── -->
        <main class="chat-area">

            <!-- Top Bar -->
            <header class="topbar">
                <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle Sidebar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
                <div class="topbar-center">
                    <span class="topbar-title">Hasu</span>
                    <span class="topbar-subtitle">AI Assistant</span>
                </div>
                <div class="topbar-right">
                    <div class="status-indicator">
                        <div class="status-dot"></div>
                        <span>Online</span>
                    </div>
                </div>
            </header>

            <!-- Messages -->
            <div class="messages-scroll" id="messages-container">
                <div class="messages-list" id="chat-messages">

                    <!-- Welcome Card -->
                    <div class="welcome-card">
                        <div class="welcome-avatar">H</div>
                        <h1 class="welcome-title">Hi, I'm Hasu</h1>
                        <p class="welcome-subtitle">Your personal AI assistant powered by Gemini. Ask me anything — I'm here to help.</p>
                        <div class="welcome-chips">
                            <button class="chip" data-prompt="Explain quantum computing in simple terms">💡 Explain something</button>
                            <button class="chip" data-prompt="Write a Python script that sorts a list of numbers">🧑‍💻 Write some code</button>
                            <button class="chip" data-prompt="Give me 5 tips to stay productive while working from home">✅ Give me tips</button>
                            <button class="chip" data-prompt="Tell me a surprising fact I probably don't know">🌍 Surprise me</button>
                        </div>
                    </div>

                </div>

                <!-- Typing Indicator -->
                <div class="typing-indicator" id="typing-indicator" style="display:none;">
                    <div class="bot-row">
                        <div class="bot-avatar-sm">H</div>
                        <div class="typing-dots">
                            <span></span><span></span><span></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Input Bar -->
            <div class="input-bar">
                <div class="input-bar-inner">
                    <form id="chat-form" class="chat-form">
                        <div class="textarea-wrapper">
                            <textarea
                                id="message-input"
                                placeholder="Message Hasu..."
                                rows="1"
                                autocomplete="off"
                                spellcheck="true"
                            ></textarea>
                            <button type="submit" id="send-btn" class="send-btn" disabled aria-label="Send">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
                                </svg>
                            </button>
                        </div>
                    </form>
                    <p class="input-disclaimer">Hasu can make mistakes. Verify important information.</p>
                </div>
            </div>

        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
